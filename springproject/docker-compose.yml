services:
  db:
    image: postgres:18
    container_name: springproject-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - internal

  app:
    image: ghcr.io/huseyun/kulakliksatisapi:infrastructure-deployment
    container_name: springproject-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./application.properties:/app/application.properties
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - db
    networks:
      - proxy-agi
      - internal

networks:
  proxy-agi:
    external: true
    name: nginx-main
  internal:
    driver: bridge
