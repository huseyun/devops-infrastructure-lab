name: Infrastructure Sync

# önceki görevleri boşverir, en son göreve odaklanır.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]
    paths:
      - 'nginx/**'
      - 'pihole/**'
      - 'nextcloud/**'
      - 'springproject/**'
      - 'portainer/**'
      - 'open-webui/**'
      - '.github/workflows/**'
      - 'teamspeak/**'

jobs:
  apply-config:
    runs-on: [self-hosted, production-server]
    
    steps:

      - name: En Güncel Ayarları Çek
        uses: actions/checkout@v4

      - name: Değişen Yolları Belirle
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nginx: 'nginx/**'
            pihole: 'pihole/**'
            nextcloud: 'nextcloud/**'
            spring: 'springproject/**'
            portainer: 'portainer/**'
            openwebui: 'open-webui/**'
            teamspeak: 'teamspeak/**'
            workflow: '.github/workflows/**'

      - name: Sırları Kasadan Getir
        run: |
          echo "Kalıcı .env dosyaları değişken üzerinden kopyalanıyor..."
          
          cp ${{ vars.SECRETS_PATH }}/nextcloud.env nextcloud/.env || echo "Nextcloud env bulunamadı"
          cp ${{ vars.SECRETS_PATH }}/nginx.env nginx/.env || echo "Nginx env bulunamadı"
          cp ${{ vars.SECRETS_PATH }}/pihole.env pihole/.env || echo "Pihole env bulunamadı"
          cp ${{ vars.SECRETS_PATH }}/spring.env springproject/.env || echo "Spring env bulunamadı"
          cp ${{ vars.SECRETS_PATH }}/open-webui.env open-webui/.env || echo "Spring env bulunamadı"
          cp ${{ vars.SECRETS_PATH }}/teamspeak.env teamspeak/.env || echo "Teamspeak env bulunamadı"
          
          echo ".env dosyaları yerleştirildi."

      - name: Script izinleri
        run: |
          echo "1. Tüm .sh scriptlerine çalıştırma izni veriliyor..."
          find . -name "*.sh" -exec chmod +x {} \;

      - name: Ortak Docker Ağını Oluştur
        run: |
          # "nginx-main" adında bir ağ var mı kontrol et, yoksa oluştur.
          docker network inspect nginx-main >/dev/null 2>&1 || \
          docker network create nginx-main

      - name: Nginx Ayarlarını Güncelle
        if: steps.filter.outputs.nginx == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Nginx konfigürasyonu uygulanıyor..."
          docker compose -f nginx/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Pi-hole Ayarlarını Güncelle
        if: steps.filter.outputs.pihole == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Pi-hole konfigürasyonu uygulanıyor..."
          docker compose -f pihole/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Nextcloud Ayarlarını Güncelle
        if: steps.filter.outputs.nextcloud == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Nextcloud konfigürasyonu uygulanıyor..."
          docker compose -f nextcloud/docker-compose.yml pull
          docker compose -f nextcloud/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Spring Projesi Konfigürasyonunu Güncelle
        if: steps.filter.outputs.spring == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Spring projesi konfigürasyonu uygulanıyor..."
          docker compose -f springproject/docker-compose.yml pull
          docker compose -f springproject/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Portainer Konfigürasyonunu Güncelle
        if: steps.filter.outputs.portainer == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Portainer konfigürasyonu uygulanıyor..."
          docker compose -f portainer/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Open WebUI konfigürasyon güncellemesi
        if: steps.filter.outputs.openwebui == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "Open WebUI konfigürasyonu uygulanıyor..."
          docker compose -f open-webui/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: TeamSpeak konfigürasyon güncellemesi
        if: steps.filter.outputs.teamspeak == 'true' # || steps.filter.outputs.workflow == 'true'
        run: |
          echo "TeamSpeak konfigürasyonu uygulanıyor..."
          docker compose -f teamspeak/docker-compose.yml up --force-recreate -d --remove-orphans

      - name: Temizlik
        run: docker image prune -f