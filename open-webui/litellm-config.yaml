  - model_name: "claude/*" 
    litellm_params:
      model: "openai/*" 
      api_key: "os.environ/API_KEY"
      api_base: "https://claudecode.codefast.app/v1"
      # Cloudflare'i atlatmak için kılık değiştiriyoruz (Browser taklidi)
      headers:
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
        "Accept": "application/json"

  - model_name: "gemini/*"
    litellm_params:
      model: "gemini/*"
      api_key: "os.environ/API_KEY"
      api_base: "https://api14.codefast.app/v1"
      headers:
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
        "Accept": "application/json"

litellm_settings:
  check_provider_endpoint: true # Modelleri çekmesi için tekrar açtık