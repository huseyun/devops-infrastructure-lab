services:
  app:
    image: ghcr.io/huseyun/nextcloud-custom:latest
    container_name: nextcloud-app
    restart: always
    volumes:
      - core:/var/www/html
      - ${DATA_LOCATION}:/var/www/html/data
      - ${CONFIG_LOCATION}:/var/www/html/config
      - apps:/var/www/html/custom_apps
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - REDIS_HOST=redis

      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${LOCAL_DOMAIN}
      - OVERWRITEPROTOCOL=http
      - OVERWRITEHOST=nextcloud.${LOCAL_DOMAIN}
      - OVERWRITECLIURL=http://nextcloud.${LOCAL_DOMAIN}
    depends_on:
      - db
      - redis
    networks:
      - proxy-agi
      - internal

  cron:
    image: ghcr.io/huseyun/nextcloud-custom:latest
    container_name: nextcloud-cron-app
    restart: always
    command: /cron.sh
    volumes:
      - core:/var/www/html
      - ${DATA_LOCATION}:/var/www/html/data
      - ${CONFIG_LOCATION}:/var/www/html/config
      - apps:/var/www/html/custom_apps
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - internal

  db:
    image: postgres:18
    container_name: nextcloud-db
    restart: always
    volumes:
      - db:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - internal

  redis:
    image: redis:latest
    restart: always
    networks:
      - internal

volumes:
  apps:
  db:
  core:

networks:
  proxy-agi:
    external: true
    name: nginx-main

  internal:
    driver: bridge
